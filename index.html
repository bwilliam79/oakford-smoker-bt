<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smoker Monitor</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(ellipse at 50% 108%, rgba(251,146,60,0.45) 0%, rgba(194,48,10,0.25) 22%, transparent 52%),
        radial-gradient(ellipse at 20% 108%, rgba(239,68,68,0.20)  0%, transparent 38%),
        radial-gradient(ellipse at 80% 108%, rgba(249,115,22,0.20) 0%, transparent 38%),
        radial-gradient(ellipse at 50% 0%,   rgba(0,0,0,0.6)       0%, transparent 60%),
        linear-gradient(180deg, #0c0704 0%, #0a0603 100%);
      color: #e0e0e0;
      min-height: 100vh; padding: 24px;
      overflow-x: hidden;
    }

    /* ── Fire floor glow ── */
    body::after {
      content: '';
      position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
      background: linear-gradient(to top, rgba(194,96,10,0.12) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    /* ── Ember + smoke particles ── */
    .smoke-wrap {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    /* Rising smoke wisps */
    .smoke {
      position: absolute; bottom: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,130,90,0.09) 0%, transparent 70%);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0)    translateX(0)   scale(1);   opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 0.35; }
      100% { transform: translateY(-90vh) translateX(30px) scale(4); opacity: 0; }
    }
    /* Glowing embers */
    .ember {
      position: absolute; bottom: -6px;
      border-radius: 50%;
      animation: ember-rise linear infinite;
    }
    @keyframes ember-rise {
      0%   { transform: translateY(0) translateX(0) scale(1);    opacity: 0; }
      8%   { opacity: 1; }
      60%  { opacity: 0.8; }
      100% { transform: translateY(-55vh) translateX(var(--drift,15px)) scale(0.15); opacity: 0; }
    }

    /* ── Page header ── */
    .page-header {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      margin-bottom: 20px; position: relative; z-index: 1; text-align: center;
    }
    .page-header-top { display: flex; align-items: center; gap: 14px; }
    .page-header svg { flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(249,115,22,0.5)); }
    .page-header h1  { font-size: 1.5rem; font-weight: 800; color: #f97316;
                       text-shadow: 0 0 20px rgba(249,115,22,0.4); }

    /* page content sits above smoke layer */
    .status-wrap, .info-row, .dash, .chart-panel, .panel { position: relative; z-index: 1; }

    h1 { font-size: 1.4rem; color: #f97316; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

    .status-bar {
      background: rgba(0,0,0,0.35); border: 1px solid #3d1f0a; border-radius: 8px;
      padding: 6px 14px; font-size: 0.82rem;
      display: inline-flex; align-items: center; gap: 10px;
      backdrop-filter: blur(4px);
    }
    .status-wrap { display: none; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .dot.connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.connecting   { background: #f97316; animation: pulse 0.8s infinite; }
    .dot.disconnected { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .info-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .info-pill {
      background: rgba(20,10,4,0.7); border: 1px solid #3d1f0a;
      border-radius: 8px; padding: 8px 14px;
      font-size: 0.78rem; color: #d97706;
    }
    .info-pill strong { color: #fde68a; }

    .dash {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px; margin-bottom: 20px;
    }
    .temp-card { width: 160px; }
    .temp-card {
      background: #111; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 16px; text-align: center;
    }
    .temp-card.grill        { border-color: #3b82f6; }
    .temp-card.probe.active  { border-color: #ef4444; }
    .temp-card.probe2.active { border-color: #facc15; }

    .temp-label   { font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
                    letter-spacing: 0.08em; color: #888; margin-bottom: 8px; }
    .temp-val-row { display: flex; align-items: baseline; justify-content: center; gap: 4px; }
    .temp-val     { font-size: 2.4rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
    .temp-unit    { font-size: 0.9rem; color: #666; }
    .temp-set     { font-size: 0.72rem; color: #888; margin-top: 6px; }
    .temp-eta     { font-size: 0.7rem; color: #555; margin-top: 3px; font-style: italic; }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); border-color: rgba(239,68,68,0.3); }
      50%       { box-shadow: 0 0 12px 4px rgba(239,68,68,0.6); border-color: rgba(239,68,68,0.9); }
    }
    @keyframes pulse-yellow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234,179,8,0); border-color: rgba(234,179,8,0.3); }
      50%       { box-shadow: 0 0 12px 4px rgba(234,179,8,0.6); border-color: rgba(234,179,8,0.9); }
    }
    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); border-color: rgba(59,130,246,0.3); }
      50%       { box-shadow: 0 0 12px 4px rgba(59,130,246,0.6); border-color: rgba(59,130,246,0.9); }
    }
    .over-temp-p1    { animation: pulse-red    1.2s ease-in-out infinite; }
    .over-temp-p2    { animation: pulse-yellow 1.2s ease-in-out infinite; }
    .over-temp-grill { animation: pulse-blue   1.2s ease-in-out infinite; }

    .temp-na      { color: #333; }

    .grill        .temp-val { color: #3b82f6; }
    .probe.active  .temp-val { color: #ef4444; }
    .probe2.active .temp-val { color: #facc15; }

    .chart-panel {
      background: #111; border: 1px solid #2a2a2a; border-radius: 10px;
      padding: 16px; margin-bottom: 16px;
    }
    .chart-panel canvas { max-height: 300px; }

    .panel { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
    .panel-header {
      background: #1e1e1e; padding: 10px 16px; font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: #888;
      border-bottom: 1px solid #2a2a2a;
      display: flex; justify-content: space-between; align-items: center;
    }
    #log { font-family: monospace; font-size: 0.75rem; line-height: 1.6;
           max-height: 280px; overflow-y: auto; padding: 8px 12px; }
    .log-entry { display: flex; gap: 10px; padding: 2px 4px; border-radius: 4px; }
    .log-entry:hover { background: rgba(255,255,255,0.03); }
    .log-ts  { color: #555; flex-shrink: 0; }
    .log-tag { flex-shrink: 0; font-weight: 700; min-width: 70px; text-align: right; }
    .log-msg { color: #ccc; word-break: break-all; }
    .tag-info  { color: #3b82f6; }
    .tag-data  { color: #3b82f6; }
    .tag-warn  { color: #f97316; }
    .tag-error { color: #ef4444; }
    .tag-sys   { color: #a78bfa; }
    .tag-alarm { color: #facc15; font-weight: 800; }
    .badge { font-size: 0.65rem; padding: 1px 6px; border-radius: 4px; background: #2a2a2a; color: #888; }

    /* ── Settings modal ── */
    .cfg-btn {
      position: fixed; top: 14px; right: 16px; z-index: 100;
      background: rgba(20,10,4,0.8); border: 1px solid #3d1f0a;
      border-radius: 8px; padding: 6px 8px; cursor: pointer;
      color: #f97316; font-size: 1.1rem; line-height: 1;
      backdrop-filter: blur(4px);
      transition: border-color 0.15s, color 0.15s;
    }
    .cfg-btn:hover { border-color: #f97316; color: #fde68a; }
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #111; border: 1px solid #3d1f0a; border-radius: 14px;
      padding: 24px 28px; width: min(420px, 92vw);
      box-shadow: 0 0 40px rgba(249,115,22,0.15);
    }
    .modal h2 {
      font-size: 1rem; font-weight: 700; color: #f97316;
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .modal-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .modal-label { font-size: 0.75rem; color: #888; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .modal-input {
      background: #0d0d0d; border: 1px solid #3d1f0a; border-radius: 7px;
      color: #fde68a; padding: 8px 12px; font-size: 0.85rem; outline: none; width: 100%;
    }
    .modal-input:focus { border-color: #f97316; }
    .modal-input::placeholder { color: #444; }
    .modal-hint { font-size: 0.7rem; color: #555; margin-top: 4px; }
    .modal-hint a { color: #f97316; text-decoration: none; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-save {
      background: #7c2d12; border: 1px solid #f97316; border-radius: 7px;
      color: #fde68a; padding: 7px 20px; font-size: 0.82rem;
      cursor: pointer; font-weight: 600;
    }
    .modal-save:hover { background: #991b1b; }
    .modal-cancel {
      background: transparent; border: 1px solid #333; border-radius: 7px;
      color: #888; padding: 7px 16px; font-size: 0.82rem; cursor: pointer;
    }
    .modal-cancel:hover { border-color: #555; color: #aaa; }
    .modal-saved { font-size: 0.75rem; color: #22c55e; align-self: center; display: none; }
    .modal-select {
      background: #0d0d0d; border: 1px solid #3d1f0a; border-radius: 7px;
      color: #fde68a; padding: 8px 12px; font-size: 0.85rem; outline: none; width: 100%;
      appearance: none; cursor: pointer;
    }
    .modal-select:focus { border-color: #f97316; }
    .modal-restart-warn {
      font-size: 0.7rem; color: #f97316; margin-top: 4px; display: none;
    }
  </style>
</head>
<body>

<!-- Gear / settings button -->
<button class="cfg-btn" onclick="openSettings()" title="Settings">⚙️</button>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2>⚙️ Settings</h2>
    <div class="modal-row">
      <label class="modal-label" for="adapterSelect">Bluetooth Adapter</label>
      <select id="adapterSelect" class="modal-select" onchange="onAdapterChange()">
        <option value="">System default</option>
      </select>
      <span class="modal-restart-warn" id="restartWarn">⚠️ Changing the adapter will restart the service.</span>
    </div>
    <div class="modal-row">
      <label class="modal-label" for="ntfyInput">ntfy.sh Push Notification Topic</label>
      <input id="ntfyInput" class="modal-input" type="text"
             placeholder="e.g. bwwilliams-smoker-monitor" autocomplete="off" />
      <span class="modal-hint">
        Receive alerts on your phone via <a href="https://ntfy.sh" target="_blank">ntfy.sh</a>.
        Leave blank to disable.
      </span>
    </div>
    <div class="modal-actions">
      <span class="modal-saved" id="modalSaved">Saved!</span>
      <button class="modal-cancel" onclick="closeSettings()">Cancel</button>
      <button class="modal-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- Background particles: embers + smoke wisps -->
<div class="smoke-wrap">
  <!-- Embers -->
  <div class="ember" style="left:6%;  width:3px; height:3px; background:radial-gradient(circle,#fde68a,#f97316,transparent); box-shadow:0 0 5px #f97316,0 0 10px rgba(249,115,22,0.4); --drift:18px;  animation-duration:3.5s; animation-delay:0.2s;"></div>
  <div class="ember" style="left:14%; width:4px; height:4px; background:radial-gradient(circle,#fbbf24,#ef4444,transparent); box-shadow:0 0 6px #ef4444,0 0 12px rgba(239,68,68,0.4);  --drift:-12px; animation-duration:4.2s; animation-delay:1.4s;"></div>
  <div class="ember" style="left:22%; width:3px; height:3px; background:radial-gradient(circle,#fde68a,#f97316,transparent); box-shadow:0 0 5px #f97316,0 0 10px rgba(249,115,22,0.4); --drift:22px;  animation-duration:3.1s; animation-delay:2.8s;"></div>
  <div class="ember" style="left:35%; width:5px; height:5px; background:radial-gradient(circle,#fef08a,#fbbf24,transparent); box-shadow:0 0 8px #fbbf24,0 0 16px rgba(251,191,36,0.5); --drift:-8px;  animation-duration:5.0s; animation-delay:0.6s;"></div>
  <div class="ember" style="left:48%; width:3px; height:3px; background:radial-gradient(circle,#fde68a,#f97316,transparent); box-shadow:0 0 5px #f97316,0 0 10px rgba(249,115,22,0.4); --drift:14px;  animation-duration:3.8s; animation-delay:3.5s;"></div>
  <div class="ember" style="left:58%; width:4px; height:4px; background:radial-gradient(circle,#fbbf24,#ef4444,transparent); box-shadow:0 0 6px #ef4444,0 0 12px rgba(239,68,68,0.4);  --drift:-18px; animation-duration:4.5s; animation-delay:1.0s;"></div>
  <div class="ember" style="left:68%; width:3px; height:3px; background:radial-gradient(circle,#fde68a,#f97316,transparent); box-shadow:0 0 5px #f97316,0 0 10px rgba(249,115,22,0.4); --drift:20px;  animation-duration:3.3s; animation-delay:4.2s;"></div>
  <div class="ember" style="left:79%; width:5px; height:5px; background:radial-gradient(circle,#fef08a,#fbbf24,transparent); box-shadow:0 0 8px #fbbf24,0 0 16px rgba(251,191,36,0.5); --drift:-10px; animation-duration:4.8s; animation-delay:2.1s;"></div>
  <div class="ember" style="left:88%; width:3px; height:3px; background:radial-gradient(circle,#fde68a,#f97316,transparent); box-shadow:0 0 5px #f97316,0 0 10px rgba(249,115,22,0.4); --drift:16px;  animation-duration:3.6s; animation-delay:0.9s;"></div>
  <div class="ember" style="left:94%; width:4px; height:4px; background:radial-gradient(circle,#fbbf24,#ef4444,transparent); box-shadow:0 0 6px #ef4444,0 0 12px rgba(239,68,68,0.4);  --drift:-14px; animation-duration:4.0s; animation-delay:5.5s;"></div>
  <!-- Smoke wisps -->
  <div class="smoke" style="left:10%; width:70px;  height:70px;  animation-duration:16s; animation-delay:0s;"></div>
  <div class="smoke" style="left:30%; width:50px;  height:50px;  animation-duration:12s; animation-delay:4s;"></div>
  <div class="smoke" style="left:55%; width:90px;  height:90px;  animation-duration:20s; animation-delay:2s;"></div>
  <div class="smoke" style="left:75%; width:60px;  height:60px;  animation-duration:14s; animation-delay:7s;"></div>
</div>

<!-- Page header -->
<div class="page-header">
  <div class="status-bar">
    <div class="dot connecting" id="statusDot"></div>
    <span id="statusText">Connecting to server…</span>
  </div>
</div>


<div class="dash">
  <div class="temp-card grill" id="cardGrill">
    <div class="temp-label">Smoker</div>
    <div class="temp-val-row">
      <div class="temp-val temp-na" id="valGrill">N/A</div>
      <div class="temp-unit">°F</div>
    </div>
    <div class="temp-set" id="setGrill"></div>
    <div class="temp-eta" id="grillAtTempTimer"></div>
  </div>
  <div class="temp-card probe" id="cardP1">
    <div class="temp-label">Probe 1</div>
    <div class="temp-val-row">
      <div class="temp-val temp-na" id="valP1">N/A</div>
      <div class="temp-unit">°F</div>
    </div>
    <div class="temp-set" id="targetP1"></div>
    <div class="temp-eta" id="etaP1"></div>
  </div>
  <div class="temp-card probe probe2" id="cardP2">
    <div class="temp-label">Probe 2</div>
    <div class="temp-val-row">
      <div class="temp-val temp-na" id="valP2">N/A</div>
      <div class="temp-unit">°F</div>
    </div>
    <div class="temp-set" id="targetP2"></div>
    <div class="temp-eta" id="etaP2"></div>
  </div>
</div>

<div class="chart-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px 6px;">
    <span style="font-size:0.8rem;color:#555;font-weight:600;letter-spacing:0.04em;">TEMPERATURE HISTORY</span>
    <button onclick="clearChart()" style="background:#222;color:#888;border:1px solid #333;border-radius:6px;padding:2px 10px;font-size:0.72rem;cursor:pointer;">Clear</button>
  </div>
  <canvas id="tempChart"></canvas>
</div>

<div class="panel">
  <div class="panel-header" onclick="toggleLog()" style="cursor:pointer;user-select:none;">
    <span>Log <span class="badge" id="logCount">0</span></span>
    <span style="display:flex;gap:8px;align-items:center;">
      <button onclick="event.stopPropagation();clearLog()" style="background:#222;color:#888;border:1px solid #333;border-radius:6px;padding:2px 10px;font-size:0.72rem;cursor:pointer;">Clear</button>
      <span id="logChevron" style="color:#555;font-size:0.8rem;">▶</span>
    </span>
  </div>
  <div id="logBody" style="display:none">
    <div style="padding:8px 12px 4px;border-bottom:1px solid #1e1e1e;">
      <span style="font-size:0.75rem;color:#555;">Smoker IP: <strong id="infoIp" style="color:#93c5fd;">—</strong></span>
      <span style="font-size:0.75rem;color:#555;margin-left:16px;">BT Address: <strong id="infoBtMac" style="color:#93c5fd;">—</strong></span>
      <span style="font-size:0.75rem;color:#555;margin-left:16px;">Signal: <strong id="infoRssi" style="color:#93c5fd;">—</strong></span>
      <span style="font-size:0.75rem;color:#555;margin-left:16px;">Poll Interval: <strong id="infoInterval" style="color:#93c5fd;">—</strong></span>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
const PROBE_DISCONNECTED = 999;

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
function fmtTime(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function ts() { return fmtTime(new Date()); }
let logEntries = 0;
function log(tag, msg, cls='tag-info', date = new Date()) {
  const c = document.getElementById('log');
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-ts">${fmtTime(date)}</span><span class="log-tag ${cls}">[${tag}]</span><span class="log-msg">${esc(msg)}</span>`;
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
  document.getElementById('logCount').textContent = ++logEntries;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(cls, text) {
  document.getElementById('statusDot').className = 'dot ' + cls;
  document.getElementById('statusText').textContent = text;
}
function setDashVisible(visible) {
  document.querySelector('.dash').style.display = visible ? '' : 'none';
}
function toggleLog() {
  const body    = document.getElementById('logBody');
  const chevron = document.getElementById('logChevron');
  const collapsed = body.style.display === 'none';
  body.style.display  = collapsed ? '' : 'none';
  chevron.textContent = collapsed ? '▼' : '▶';
}
function clearLog() {
  document.getElementById('log').innerHTML = '';
  logEntries = 0;
  document.getElementById('logCount').textContent = 0;
}
function clearChart() {
  chartTimestamps.length = 0;
  chartLabels.length = 0;
  Object.values(DS).forEach(arr => arr.length = 0);
  chart.update();
  fetch('/api/clear-history', { method: 'POST' });
}

// ── Settings modal ────────────────────────────────────────────────────────────
let _originalAdapter = '';

async function openSettings() {
  try {
    const [cfgRes, adpRes] = await Promise.all([fetch('/api/config'), fetch('/api/adapters')]);
    const cfg = await cfgRes.json();
    const adp = await adpRes.json();

    // Populate adapter dropdown
    const sel = document.getElementById('adapterSelect');
    sel.innerHTML = '<option value="">System default</option>';
    adp.adapters.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a; opt.textContent = a;
      if (a === adp.current) opt.selected = true;
      sel.appendChild(opt);
    });
    _originalAdapter = adp.current || '';

    document.getElementById('ntfyInput').value = cfg.ntfy_topic || '';
  } catch (e) { /* non-fatal — open anyway */ }
  document.getElementById('modalSaved').style.display  = 'none';
  document.getElementById('restartWarn').style.display = 'none';
  document.getElementById('settingsOverlay').classList.add('open');
}

function onAdapterChange() {
  const changed = document.getElementById('adapterSelect').value !== _originalAdapter;
  document.getElementById('restartWarn').style.display = changed ? 'block' : 'none';
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

async function saveSettings() {
  const topic   = document.getElementById('ntfyInput').value.trim();
  const adapter = document.getElementById('adapterSelect').value;
  const savedEl = document.getElementById('modalSaved');
  try {
    const res = await fetch('/api/config', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ ntfy_topic: topic, adapter }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    savedEl.style.display = 'inline';
    log('SYS', `Settings saved — adapter: ${adapter || 'default'}, ntfy: ${topic || '(none)'}.`, 'tag-sys');
    if (data.restarting) {
      log('SYS', 'Adapter changed — service restarting…', 'tag-sys');
      setTimeout(() => { savedEl.textContent = 'Restarting…'; }, 800);
      setTimeout(closeSettings, 2000);
    } else {
      setTimeout(closeSettings, 1200);
    }
  } catch (e) {
    log('ERROR', `Failed to save settings: ${e}`, 'tag-error');
  }
}

// ── Chart ─────────────────────────────────────────────────────────────────────
const CHART_WINDOW_MS = 24 * 60 * 60 * 1000; // 24 hours
const chartLabels     = [];
const chartTimestamps = [];
const DS = {
  grill:       [],
  grillTarget: [],
  p1:          [],
  p1Target:    [],
  p2:          [],
  p2Target:    [],
};

function makeDataset(label, data, color, dashed) {
  return {
    label, data, borderColor: color, backgroundColor: 'transparent',
    borderWidth: dashed ? 1 : 2,
    borderDash: dashed ? [6, 4] : [],
    pointRadius: dashed ? 0 : 3,
    pointHoverRadius: dashed ? 0 : 5,
    tension: 0.3, spanGaps: true,
  };
}

const chart = new Chart(document.getElementById('tempChart'), {
  type: 'line',
  data: {
    labels: chartLabels,
    datasets: [
      makeDataset('Smoker',         DS.grill,       '#3b82f6', false),
      makeDataset('Smoker Target',  DS.grillTarget, '#3b82f6', true),
      makeDataset('Probe 1',        DS.p1,          '#ef4444', false),
      makeDataset('Probe 1 Target', DS.p1Target,    '#ef4444', true),
      makeDataset('Probe 2',        DS.p2,          '#facc15', false),
      makeDataset('Probe 2 Target', DS.p2Target,    '#facc15', true),
    ],
  },
  options: {
    responsive: true, animation: false,
    interaction: { mode: 'index', intersect: false },
    scales: {
      x: { ticks: { color: '#666', maxTicksLimit: 10 }, grid: { color: '#1e1e1e' } },
      y: { ticks: { color: '#666', callback: v => `${v}°F` }, grid: { color: '#1e1e1e' }, beginAtZero: false },
    },
    plugins: {
      legend: { labels: { color: '#888', boxWidth: 20, padding: 16,
        filter: (item, data) => data.datasets[item.datasetIndex].data.some(v => v !== null)
      } },
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}°F` } },
    },
  },
});

function pushChartPoint(d, date = new Date(), skipUpdate = false) {
  chartTimestamps.push(date.getTime());
  chartLabels.push(fmtTime(date));
  DS.grill.push(d.grill);
  DS.grillTarget.push(d.setPoint);
  DS.p1.push(d.probes[0] < PROBE_DISCONNECTED ? d.probes[0] : null);
  DS.p1Target.push(d.probes[0] < PROBE_DISCONNECTED && d.probeTargets[0] < PROBE_DISCONNECTED ? d.probeTargets[0] : null);
  DS.p2.push(d.probes[1] < PROBE_DISCONNECTED ? d.probes[1] : null);
  DS.p2Target.push(d.probes[1] < PROBE_DISCONNECTED && d.probeTargets[1] < PROBE_DISCONNECTED ? d.probeTargets[1] : null);

  // Trim entries older than 24 hours
  const cutoff = Date.now() - CHART_WINDOW_MS;
  while (chartTimestamps.length && chartTimestamps[0] < cutoff) {
    chartTimestamps.shift();
    chartLabels.shift();
    Object.values(DS).forEach(arr => arr.shift());
  }

  if (!skipUpdate) chart.update();
}

// ── Dashboard update ──────────────────────────────────────────────────────────
function updateDash(d) {
  document.getElementById('valGrill').textContent  = d.grill;
  document.getElementById('valGrill').classList.remove('temp-na');
  document.getElementById('setGrill').textContent  = `Target: ${d.setPoint}°F`;

  d.probes.forEach((p, i) => {
    const cardEl   = document.getElementById(`cardP${i+1}`);
    const target   = d.probeTargets[i];
    if (p >= PROBE_DISCONNECTED) {
      cardEl.style.display = 'none';
      cardEl.classList.remove('active');
    } else {
      cardEl.style.display = '';
      cardEl.classList.add('active');
      document.getElementById(`valP${i+1}`).textContent    = p;
      document.getElementById(`valP${i+1}`).classList.remove('temp-na');
      document.getElementById(`targetP${i+1}`).textContent = target < PROBE_DISCONNECTED ? `Target: ${target}°F` : '';
      displayEta(i, d.eta ? d.eta[i] : null, d.stalled ? d.stalled[i] : false);
    }
  });

  if (d.ip)       document.getElementById('infoIp').textContent       = d.ip;
  if (d.address)  document.getElementById('infoBtMac').textContent    = d.address;
  if (d.interval) document.getElementById('infoInterval').textContent = `${d.interval}s`;
  if (d.rssi != null) {
    const el    = document.getElementById('infoRssi');
    const label = d.rssi >= -65 ? 'Good' : d.rssi >= -80 ? 'Fair' : 'Weak';
    const color = d.rssi >= -65 ? '#22c55e' : d.rssi >= -80 ? '#facc15' : '#ef4444';
    el.textContent = label;
    el.style.color = color;
  }
}

// ── ETA display (server-computed) ─────────────────────────────────────────────
function displayEta(index, etaMins, stalled) {
  const el = document.getElementById(`etaP${index + 1}`);
  if (!el) return;
  if (stalled) {
    el.textContent   = 'In stall – ETA paused';
    el.style.color   = '#f97316';
    el.style.fontStyle = 'italic';
    return;
  }
  el.style.color     = '';
  el.style.fontStyle = '';
  if (etaMins === null || etaMins === undefined) { el.textContent = 'Estimating…'; return; }
  if (etaMins < 1)  { el.textContent = 'ETA < 1 min'; return; }
  if (etaMins < 60) { el.textContent = `ETA ~${etaMins} min`; return; }
  const h = Math.floor(etaMins / 60);
  const m = etaMins % 60;
  el.textContent = m > 0 ? `ETA ~${h}h ${m}m` : `ETA ~${h}h`;
}

// ── Alarms ────────────────────────────────────────────────────────────────────
const alarmFired        = [false, false];
const overTempFired     = [false, false];
const overTempInterval  = [null,  null];
let   grillAlarmFired      = false;
let   grillOverTempFired   = false;
let   grillOverTempInterval = null;
let   grillAtTempSince  = null;   // timestamp when smoker first reached target
let   grillAtTempTick   = null;   // setInterval handle

function formatDuration(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}m ${sec}s`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

function startGrillAtTempTimer() {
  if (grillAtTempTick) return;
  grillAtTempSince = Date.now();
  const el = document.getElementById('grillAtTempTimer');
  grillAtTempTick = setInterval(() => {
    el.textContent = `At temp for ${formatDuration(Date.now() - grillAtTempSince)}`;
  }, 1000);
}

function stopGrillAtTempTimer() {
  clearInterval(grillAtTempTick);
  grillAtTempTick  = null;
  grillAtTempSince = null;
  document.getElementById('grillAtTempTimer').textContent = '';
}

function startGrillOverTempAlarm() {
  if (grillOverTempInterval) return;
  stopGrillAtTempTimer();
  const el = document.getElementById('grillAtTempTimer');
  el.innerHTML = '⚠️ <strong style="color:#ef4444">Over Temperature</strong>';
  document.getElementById('cardGrill').classList.add('over-temp-grill');
  playSiren();
  grillOverTempInterval = setInterval(playSiren, 30_000);
}

function clearGrillOverTempAlarm() {
  clearInterval(grillOverTempInterval);
  grillOverTempInterval = null;
  grillOverTempFired    = false;
  document.getElementById('cardGrill').classList.remove('over-temp-grill');
  document.getElementById('grillAtTempTimer').textContent = '';
}

function startOverTempAlarm(i) {
  if (overTempInterval[i]) return;
  playSiren();
  overTempInterval[i] = setInterval(playSiren, 30_000);
}

function clearOverTempAlarm(i) {
  clearInterval(overTempInterval[i]);
  overTempInterval[i] = null;
  overTempFired[i] = false;
}

// Single shared AudioContext — unlocked on any user interaction
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener('click', () => audioCtx.resume());

async function playSiren(durationSec = 2.5) {
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + durationSec);

  const steps = Math.floor(durationSec / 0.3);
  for (let i = 0; i < steps; i++) {
    const t = audioCtx.currentTime + i * 0.3;
    osc.frequency.setValueAtTime(i % 2 === 0 ? 1050 : 750, t);
  }

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + durationSec);
}

function announce(msg) {
  log('ALARM', msg, 'tag-alarm');
  const utt = new SpeechSynthesisUtterance(msg);
  utt.rate = 0.95;
  speechSynthesis.speak(utt);
}

function checkAlarms(d) {
  // Smoker alarm
  if (!grillOverTempFired && d.grill > d.setPoint + 5) {
    grillOverTempFired = true;
    startGrillOverTempAlarm();
  }
  if (grillOverTempFired && d.grill <= d.setPoint + 5) {
    clearGrillOverTempAlarm();
  }

  const grillAtTemp    = !grillOverTempFired && Math.abs(d.grill - d.setPoint) <= 5;
  const grillUnderTemp = !grillOverTempFired && d.grill < d.setPoint - 5;

  if (grillAtTemp) {
    startGrillAtTempTimer();
    document.getElementById('grillAtTempTimer').style.cssText = '';
    if (!grillAlarmFired) {
      grillAlarmFired = true;
      announce(`The smoker has reached its set temperature of ${d.setPoint} degrees.`);
    }
  } else if (grillUnderTemp) {
    stopGrillAtTempTimer();
    grillAlarmFired = false;
    const el = document.getElementById('grillAtTempTimer');
    el.innerHTML = '<strong style="color:#facc15;font-weight:bold">Under Temperature</strong>';
  } else if (!grillOverTempFired) {
    stopGrillAtTempTimer();
    document.getElementById('grillAtTempTimer').textContent = '';
  }

  // Probe alarms
  d.probes.forEach((temp, i) => {
    const target = d.probeTargets[i];
    if (temp >= PROBE_DISCONNECTED || target >= PROBE_DISCONNECTED) return;

    if (!alarmFired[i] && temp >= target) {
      alarmFired[i] = true;
      announce(`Probe ${i + 1} has reached its target temperature of ${target} degrees.`);
    }
    if (alarmFired[i] && temp < target - 5) alarmFired[i] = false;

    if (!overTempFired[i] && temp > target + 5) {
      overTempFired[i] = true;
      startOverTempAlarm(i);
    }
    if (overTempFired[i] && temp <= target + 5) {
      clearOverTempAlarm(i);
    }
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const wsUrl = `ws://${location.host}/ws`;
  log('SYS', `Connecting to ${wsUrl}…`, 'tag-sys');
  const ws = new WebSocket(wsUrl);

  let smokerWasOffline = false;

  ws.onopen = () => {
    setStatus('connecting', 'Waiting for smoker…');
    setDashVisible(false);
    log('SYS', 'WebSocket connected.', 'tag-sys');
  };

  ws.onmessage = ({ data }) => {
    const d = JSON.parse(data);
    if (d.type === 'clear_history') {
      chartTimestamps.length = 0;
      chartLabels.length = 0;
      Object.values(DS).forEach(arr => arr.length = 0);
      chart.update();
      log('SYS', 'Chart history cleared.', 'tag-sys');
      return;
    }
    if (d.type === 'history') {
      d.data.forEach(pt => pushChartPoint(pt, new Date(pt.ts * 1000), true));
      chart.update();

      // Restore at-temp timer: find the start of the current consecutive at-temp streak
      if (d.smoker_online && d.data.length) {
        const latest = d.data[d.data.length - 1];
        const atTemp = Math.abs(latest.grill - latest.setPoint) <= 5 && latest.grill <= latest.setPoint + 5;
        if (atTemp) {
          let atTempStart = latest.ts * 1000;
          for (let i = d.data.length - 2; i >= 0; i--) {
            const pt = d.data[i];
            if (Math.abs(pt.grill - pt.setPoint) <= 5 && pt.grill <= pt.setPoint + 5) {
              atTempStart = pt.ts * 1000;
            } else { break; }
          }
          grillAtTempSince = atTempStart;
          const el = document.getElementById('grillAtTempTimer');
          grillAtTempTick = setInterval(() => {
            el.textContent = `At temp for ${formatDuration(Date.now() - grillAtTempSince)}`;
          }, 1000);
        }
      }

      if (d.data.length) updateDash(d.data[d.data.length - 1]);
      (d.logs || []).forEach(e => log(e.tag, e.msg, e.cls, new Date(e.ts * 1000)));
      log('SYS', `Session restored: ${d.data.length} data point(s), ${(d.logs||[]).length} log event(s).`, 'tag-sys');
      if (d.smoker_online) { setStatus('connected', 'Connected'); setDashVisible(true); }
      return;
    }
    if (d.smoker_offline) {
      if (!smokerWasOffline) {
        smokerWasOffline = true;
        log('WARN', 'Smoker offline — retrying…', 'tag-warn');
      }
      setStatus('connecting', 'Smoker unreachable…');
      setDashVisible(false);
      return;
    }
    if (d.error) {
      log('ERROR', d.error, 'tag-error');
      return;
    }
    const tickDate = new Date(d.ts * 1000);
    if (smokerWasOffline) {
      smokerWasOffline = false;
      log('SYS', 'Smoker reconnected.', 'tag-sys', tickDate);
    }
    setStatus('connected', 'Connected');
    setDashVisible(true);
    updateDash(d);
    pushChartPoint(d, tickDate);
    checkAlarms(d);
  };

  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected — reconnecting in 5s…');
    log('WARN', 'WebSocket closed. Reconnecting…', 'tag-warn');
    setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    setStatus('disconnected', 'Connection error — reconnecting in 5s…');
  };

  // Send a ping every 30s to keep the connection alive through proxies
  const ping = setInterval(() => {
    if (ws.readyState === WebSocket.OPEN) ws.send('ping');
    else clearInterval(ping);
  }, 30000);
}

connect();
</script>
